<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script async defer crossorigin="anonymous"
        src="https://connect.facebook.net/ko_KR/sdk.js#xfbml=1&version=v25.0&appId=APP_ID"></script>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    .iif {
        width: 600px;
        height: 400px;
        border: 1px solid red;
        margin: 100px auto 0;
    }

    .iif4 {
        width: 560px;
        height: 315px;
        border: 1px solid red;
        margin: 100px auto 0;
    }

    .iif5 {
        width: 1280px;
        height: 720px;
        border: 1px solid red;
        margin: 100px auto 0;
    }

    .iif6 {
        width: 300px;
        height: 500px;
        border: 1px solid red;
        margin: 100px auto 0;
    }
</style>



<body>
    <div class="iif iif1">
        <iframe src="https://nate.com" width="600" height="400" frameborder="0"></iframe>
    </div>
    <div class="iif iif2">
        <iframe src="v1.mp4" frameborder="0"></iframe>
    </div>
    <div class="iif iif3">
        <iframe src="https://nate.com" width="600" height="400" frameborder="0" marginwidth="0" marginheight="0"
            scrolling="no"></iframe>
    </div>
    <div class="iif iif4">
        <iframe width="560" height="315" src="https://www.youtube.com/embed/tfXvLf9Afrg?si=8uTBP_S0uvBQV2Vl"
            title="YouTube video player" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>
    <div class="iif iif5">
        <iframe width="1280" height="720" src="https://www.youtube.com/embed/tfXvLf9Afrg?si=8uTBP_S0uvBQV2Vl"
            title="YouTube video player" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>
    <div class="iif iif6">
        <div class="fb-page" data-href="https://www.facebook.com/cliokr/" data-tabs="timeline" data-width="300"
            data-height="500" data-small-header="false" data-adapt-container-width="true" data-hide-cover="false"
            data-show-facepile="true">
            <blockquote cite="https://www.facebook.com/cliokr/" class="fb-xfbml-parse-ignore"><a
                    href="https://www.facebook.com/cliokr/">클리오 CLIO</a></blockquote>
        </div>
    </div>
</body>

</html>
