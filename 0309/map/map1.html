<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Kakao Map</title>
</head>

<body>

    <h2>카카오 지도 테스트</h2>

    <div id="map" style="width:600px;height:400px;"></div>

    <script type="text/javascript"
        src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=6f92e2869b88f2373826e1ec15e5061c"></script>

    <script>
        var container = document.getElementById('map');

        var options = {
            center: new kakao.maps.LatLng(37.486026, 126.898017),
            level: 5,
        };

        var map = new kakao.maps.Map(container, options);

        var markerPosition = new kakao.maps.LatLng(37.486026, 126.898017);

        // 마커를 생성합니다
        var marker = new kakao.maps.Marker({
            position: markerPosition
        });
        marker.setMap(map);
    </script>

</body>

</html>
