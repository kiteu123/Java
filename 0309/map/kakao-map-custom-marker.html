<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오맵 - 커스텀 마커 예제</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        #map {
            width: 100%;
            height: 500px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        .btn:hover {
            background: #764ba2;
        }
        
        .btn.active {
            background: #764ba2;
        }
        
        .info-box {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .info-box h3 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .marker-type {
            display: inline-block;
            padding: 10px 15px;
            margin: 5px;
            background: white;
            border-radius: 5px;
            border: 2px solid #667eea;
        }
        
        .marker-type strong {
            color: #333;
            display: block;
            margin-bottom: 5px;
        }
        
        .marker-type span {
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 카카오맵 - 커스텀 마커 예제</h1>
        <p class="subtitle">다양한 스타일의 커스텀 마커를 사용하는 방법입니다.</p>
        
        <div class="controls">
            <button class="btn" onclick="changeMarkerType('default')">기본 마커</button>
            <button class="btn" onclick="changeMarkerType('red')">빨간 마커</button>
            <button class="btn" onclick="changeMarkerType('blue')">파란 마커</button>
            <button class="btn" onclick="changeMarkerType('custom')">커스텀 마커</button>
        </div>
        
        <div id="map"></div>
        
        <div class="info-box">
            <h3>📍 마커 타입</h3>
            <div class="marker-type">
                <strong>기본 마커</strong>
                <span>카카오맵 기본 마커</span>
            </div>
            <div class="marker-type">
                <strong>빨간 마커</strong>
                <span>카카오맵 제공 빨간색 마커</span>
            </div>
            <div class="marker-type">
                <strong>파란 마커</strong>
                <span>카카오맵 제공 파란색 마커</span>
            </div>
            <div class="marker-type">
                <strong>커스텀 마커</strong>
                <span>직접 만든 이미지 마커</span>
            </div>
        </div>
    </div>
    
    <!-- 카카오맵 API 스크립트 -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=YOUR_JAVASCRIPT_KEY"></script>
    <script>
        var map;
        var markers = [];
        var currentMarkerType = 'default';
        
        // 지도 초기화
        var container = document.getElementById('map');
        var options = {
            center: new kakao.maps.LatLng(37.5665, 126.9780),
            level: 5
        };
        map = new kakao.maps.Map(container, options);
        
        // 위치 데이터
        var positions = [
            {title: '서울시청', latlng: new kakao.maps.LatLng(37.5665, 126.9780)},
            {title: '명동', latlng: new kakao.maps.LatLng(37.5636, 126.9826)},
            {title: '남산타워', latlng: new kakao.maps.LatLng(37.5512, 126.9882)}
        ];
        
        // 마커 이미지 생성 함수
        function createMarkerImage(type) {
            var imageSrc, imageSize, imageOption;
            
            switch(type) {
                case 'red':
                    imageSrc = 'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_red.png';
                    imageSize = new kakao.maps.Size(50, 50);
                    imageOption = {offset: new kakao.maps.Point(25, 50)};
                    break;
                case 'blue':
                    imageSrc = 'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_blue.png';
                    imageSize = new kakao.maps.Size(50, 50);
                    imageOption = {offset: new kakao.maps.Point(25, 50)};
                    break;
                case 'custom':
                    // 커스텀 마커 이미지 (SVG를 사용한 예제)
                    // 실제로는 자신의 이미지 URL을 사용하세요
                    imageSrc = 'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png';
                    imageSize = new kakao.maps.Size(50, 50);
                    imageOption = {offset: new kakao.maps.Point(25, 50)};
                    break;
                default:
                    return null; // 기본 마커 사용
            }
            
            return new kakao.maps.MarkerImage(imageSrc, imageSize, imageOption);
        }
        
        // 마커 생성 함수
        function createMarkers(type) {
            // 기존 마커 제거
            markers.forEach(function(marker) {
                marker.setMap(null);
            });
            markers = [];
            
            // 마커 이미지 생성
            var markerImage = createMarkerImage(type);
            
            // 새 마커 생성
            positions.forEach(function(pos) {
                var markerOptions = {
                    position: pos.latlng,
                    title: pos.title
                };
                
                if (markerImage) {
                    markerOptions.image = markerImage;
                }
                
                var marker = new kakao.maps.Marker(markerOptions);
                marker.setMap(map);
                markers.push(marker);
            });
        }
        
        // 마커 타입 변경 함수
        function changeMarkerType(type) {
            currentMarkerType = type;
            createMarkers(type);
            
            // 버튼 활성화 상태 변경
            document.querySelectorAll('.btn').forEach(function(btn) {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }
        
        // 초기 마커 생성
        createMarkers('default');
        
        // 모든 마커 보기
        var bounds = new kakao.maps.LatLngBounds();
        positions.forEach(function(pos) {
            bounds.extend(pos.latlng);
        });
        map.setBounds(bounds);
    </script>
</body>
</html>
