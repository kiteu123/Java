<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오맵 - 클러스터 예제</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        #map {
            width: 100%;
            height: 500px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        .btn:hover {
            background: #764ba2;
        }
        
        .info-box {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .info-box h3 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .info-box p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        
        .stat {
            display: inline-block;
            padding: 10px 15px;
            margin: 5px;
            background: white;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }
        
        .stat strong {
            color: #333;
            display: block;
            margin-bottom: 5px;
        }
        
        .stat span {
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 카카오맵 - 클러스터 예제</h1>
        <p class="subtitle">많은 마커를 효율적으로 표시하기 위한 클러스터링 기능입니다.</p>
        
        <div class="controls">
            <button class="btn" onclick="addRandomMarkers(10)">마커 10개 추가</button>
            <button class="btn" onclick="addRandomMarkers(50)">마커 50개 추가</button>
            <button class="btn" onclick="clearMarkers()">모든 마커 제거</button>
        </div>
        
        <div id="map"></div>
        
        <div class="info-box">
            <h3>📈 통계</h3>
            <div class="stat">
                <strong>마커 개수</strong>
                <span id="markerCount">0</span>
            </div>
            <div class="stat">
                <strong>클러스터 개수</strong>
                <span id="clusterCount">0</span>
            </div>
            <p style="margin-top: 15px; color: #666; font-size: 14px;">
                <strong>💡 설명:</strong> 마커가 많을 때 클러스터로 묶어서 표시하면 성능이 향상되고 보기 좋습니다.
                지도를 확대하면 클러스터가 분리되어 개별 마커로 표시됩니다.
            </p>
        </div>
    </div>
    
    <!-- 카카오맵 API 스크립트 -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=YOUR_JAVASCRIPT_KEY"></script>
    <script>
        var map;
        var markers = [];
        var clusterer;
        
        // 지도 초기화
        var container = document.getElementById('map');
        var options = {
            center: new kakao.maps.LatLng(37.5665, 126.9780),
            level: 5
        };
        map = new kakao.maps.Map(container, options);
        
        // 클러스터러 초기화
        clusterer = new kakao.maps.MarkerClusterer({
            map: map,
            averageCenter: true,
            minLevel: 6,
            gridSize: 60
        });
        
        // 랜덤 마커 추가 함수
        function addRandomMarkers(count) {
            var newMarkers = [];
            
            for (var i = 0; i < count; i++) {
                // 서울 지역 내 랜덤 좌표 생성
                var lat = 37.5665 + (Math.random() - 0.5) * 0.2;
                var lng = 126.9780 + (Math.random() - 0.5) * 0.2;
                
                var marker = new kakao.maps.Marker({
                    position: new kakao.maps.LatLng(lat, lng)
                });
                
                newMarkers.push(marker);
            }
            
            // 기존 마커에 추가
            markers = markers.concat(newMarkers);
            
            // 클러스터러에 마커 추가
            clusterer.addMarkers(newMarkers);
            
            // 통계 업데이트
            updateStats();
        }
        
        // 모든 마커 제거 함수
        function clearMarkers() {
            clusterer.clear();
            markers = [];
            updateStats();
        }
        
        // 통계 업데이트 함수
        function updateStats() {
            document.getElementById('markerCount').textContent = markers.length;
            
            // 클러스터 개수는 대략적으로 계산
            var clusterCount = Math.ceil(markers.length / 10);
            document.getElementById('clusterCount').textContent = clusterCount;
        }
        
        // 초기 마커 추가
        addRandomMarkers(20);
    </script>
</body>
</html>
