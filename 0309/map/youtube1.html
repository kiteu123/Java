<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">

    <style>
        .youtube-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            /* 16:9 비율 */
        }

        .youtube-container iframe {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }
    </style>

</head>

<body>

    <div class="youtube-container">
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video player" frameborder="0"
            allowfullscreen>
        </iframe>
    </div>

</body>

</html>
