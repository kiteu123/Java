<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.1.1.js"></script>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    .body {
        height: 3000px;
    }

    .box {
        width: 150px;
        height: 150px;
    }

    .box1 {
        background-color: aqua;
        position: absolute;
        top: 300px;
        left: -150px;
    }

    .box2 {
        background-color: blueviolet;
        position: absolute;
        top: 1200px;
        left: -150px;
    }

    .box3 {
        background-color: brown;
        position: absolute;
        top: 1800px;
        left: 300px;
        right: -200px;
    }

    .box4 {
        background-color: coral;
        position: absolute;
        top: 2800px;
        left: 575px;
        right: -200px;
        transition: right 0.3s;
    }

    .box4.on {
        right: 500px;
    }

    .sTop {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 10;
    }
</style>

<body>
    <h1 class="sTop">0000</h1>
    <div class="box box1">박스1</div>
    <div class="box box2">박스2</div>
    <div class="box box3">박스3</div>
    <div class="box box4">박스4</div>
    <script>
        $(window).scroll(function () {
            let scroll = $(window).scrollTop();

            $('.sTop').text(scroll);

            if (scroll > 10) {
                $('.box1').stop().animate({ left: "50%" }, 800);
            }

            if (scroll > 500) {
                $('.box2').stop().animate({ left: "50%" }, 800);
            }

            if (scroll >= 1200) {
                $('.box3').stop().animate({ right: "50%" }, 800);
            }

            // ✅ box4 처리
            if (scroll > 1500) {
                $('.box4').addClass('on');
            } else {
                $('.box4').removeClass('on');
            }
        });
    </script>
</body>

</html>
