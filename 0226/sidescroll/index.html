<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizontal Scroll Page</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/jquery-3.1.1.min.js"></script>
    <script src="js/main.js"></script>
</head>

<body>
    <nav class="nav">
        <ul>
            <li><button data-index="0">Home</button></li>
            <li><button data-index="1">Main</button></li>
            <li><button data-index="2">Web</button></li>
            <li><button data-index="3">Profile</button></li>
        </ul>
    </nav>

    <div class="container">

        <section class="page page1">HOME</section>
        <section class="page page2">MAIN</section>
        <section class="page page3">WEB</section>
        <section class="page page4">PROFILE</section>

    </div>

</body>

</html>
