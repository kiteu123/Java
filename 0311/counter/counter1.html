<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="http://code.jquery.com/jquery-3.1.1.min.js"></script>
</head>

<body>
    <h1 id="num" data-num="">75</h1>
</body>
<script>
    $(function () {
        var number = $("#num").text();
        $({ percent: 0 }).animate({ percent: number }, {
            duration: 3000,
            progress: function () {
                var now = this.percent;
                $('#num').text(Math.ceil(now));
            }
        });
    })
</script>

</html>
