<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오맵 - 마커 예제</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        #map {
            width: 100%;
            height: 500px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        .btn:hover {
            background: #764ba2;
        }
        
        .info-box {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .info-box h3 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .marker-list {
            list-style: none;
        }
        
        .marker-list li {
            padding: 10px;
            margin-bottom: 10px;
            background: white;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }
        
        .marker-list li strong {
            color: #333;
            display: block;
            margin-bottom: 5px;
        }
        
        .marker-list li span {
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📍 카카오맵 - 마커 예제</h1>
        <p class="subtitle">여러 위치에 마커를 표시하고 관리하는 방법입니다.</p>
        
        <div class="controls">
            <button class="btn" onclick="addMarker()">마커 추가</button>
            <button class="btn" onclick="removeMarker()">마커 제거</button>
            <button class="btn" onclick="showAllMarkers()">모든 마커 보기</button>
        </div>
        
        <div id="map"></div>
        
        <div class="info-box">
            <h3>📍 마커 목록</h3>
            <ul class="marker-list" id="markerList">
                <li>
                    <strong>서울시청</strong>
                    <span>위도: 37.5665, 경도: 126.9780</span>
                </li>
                <li>
                    <strong>명동</strong>
                    <span>위도: 37.5636, 경도: 126.9826</span>
                </li>
                <li>
                    <strong>남산타워</strong>
                    <span>위도: 37.5512, 경도: 126.9882</span>
                </li>
            </ul>
        </div>
    </div>
    
    <!-- 카카오맵 API 스크립트 -->
   <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=bceccd594bb478b5533d7d2ec63f8bb0"></script>
    <script>
        var map;
        var markers = [];
        
        // 지도 초기화
        var container = document.getElementById('map');
        var options = {
            center: new kakao.maps.LatLng(37.5665, 126.9780),
            level: 5
        };
        map = new kakao.maps.Map(container, options);
        
        // 마커 데이터
        var positions = [
            {title: '서울시청', latlng: new kakao.maps.LatLng(37.5665, 126.9780)},
            {title: '명동', latlng: new kakao.maps.LatLng(37.5636, 126.9826)},
            {title: '남산타워', latlng: new kakao.maps.LatLng(37.5512, 126.9882)}
        ];
        
        // 초기 마커 생성
        positions.forEach(function(pos) {
            var marker = new kakao.maps.Marker({
                position: pos.latlng,
                title: pos.title
            });
            marker.setMap(map);
            markers.push(marker);
        });
        
        // 마커 추가 함수
        function addMarker() {
            var lat = 37.5665 + (Math.random() - 0.5) * 0.1;
            var lng = 126.9780 + (Math.random() - 0.5) * 0.1;
            
            var marker = new kakao.maps.Marker({
                position: new kakao.maps.LatLng(lat, lng)
            });
            marker.setMap(map);
            markers.push(marker);
            
            // 지도 중심 이동
            map.setCenter(marker.getPosition());
        }
        
        // 마커 제거 함수
        function removeMarker() {
            if (markers.length > 0) {
                var marker = markers.pop();
                marker.setMap(null);
            }
        }
        
        // 모든 마커 보기
        function showAllMarkers() {
            if (markers.length === 0) return;
            
            var bounds = new kakao.maps.LatLngBounds();
            markers.forEach(function(marker) {
                bounds.extend(marker.getPosition());
            });
            map.setBounds(bounds);
        }
        
        // 초기 로드 시 모든 마커 보기
        setTimeout(showAllMarkers, 100);
    </script>
</body>
</html>
