<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script defer src="https://use.fontawesome.com/releases/v5.15.2/js/all.js"
        integrity="sha384-vuFJ2JiSdUpXLKGK+tDteQZBqNlMwAjhZ3TvPaDfN9QmbPb7Q8qUpbSNapQev3YF"
        crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.1.1.js"></script>

    <script>
        $(function () {
            let weatherIcon = {
                '01': 'fas fa-sun',
                '02': 'fas fa-cloud-sun',
                '03': 'fas fa-cloud',
                '04': 'fas fa-cloud-meatball',
                '09': 'fas fa-cloud-sun-rain',
                '10': 'fas fa-cloud-showers-heavy',
                '11': 'fas fa-poo-storm',
                '13': 'fas fa-snowflake',
                '50': 'fas fa-smog'
            }
            let apiURL = "http://api.openweathermap.org/data/2.5/weather?id=1835848&appid=cd63accc133fc76e1f94a3f270442688&units=metric ";
            $.ajax({
                url: apiURL,        // 요청 서버 URL
                type: "GET",             // HTTP 메소드 (GET, POST 등)
                //  data: { id: "123" },     // 서버로 보낼 데이터
                dataType: "json",        // 응답 데이터 형식
                success: function (resp) {
                    //console.log("성공:", resp); // 성공 시 처리
                    console.log("현재 온도" + resp.main.temp);
                    console.log("현재 습도" + resp.main.humidity)
                    console.log("상세 날씨" + resp.weather[0].description)
                    console.log("날씨 아이콘" + resp.weather[0].icon)
                    console.log("바람 속도" + resp.wind.speed)
                    console.log("현재 국가" + resp.sys.country)
                    console.log("도시명" + resp.name)
                    console.log("구름" + resp.clouds.all)

                    $('.ctemp').append(resp.main.temp);
                    $('.cicon').append(`<i class="${weatherIcon[resp.weather[0].icon.substr(0, 2)]}"></i>`); //50d -> 50

                },
                error: function (xhr, status, error) {
                    console.error("에러:", error);  // 에러 시 처리
                }
            });




        });


    </script>

</head>

<body>
    <h1>weather api</h1>
    <h2> | 날씨예보</h2>
    <div class="ctemp">현재온도: </div>
    <div class="clowtemp">최저온도: </div>
    <div class="chightemp">최고 온도: </div>
    <div class="cicon">아이콘: </div>

    <img src=https://openweathermap.org/img/wn/10d@2x.png>

</body>

</html>
