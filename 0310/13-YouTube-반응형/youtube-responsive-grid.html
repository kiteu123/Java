<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube 반응형 - 그리드 레이아웃</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        /* 그리드 레이아웃 */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin: 30px 0;
        }
        
        .video-item {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 비율 */
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .video-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        
        .video-item iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .video-title {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            color: white;
            padding: 15px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .video-item:hover .video-title {
            opacity: 1;
        }
        
        @media (max-width: 768px) {
            .video-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 YouTube 동영상 그리드 레이아웃</h1>
        <p class="subtitle">여러 개의 YouTube 동영상을 반응형 그리드로 배치합니다.</p>
        
        <div class="video-grid">
            <div class="video-item">
                <iframe 
                    src="https://www.youtube.com/embed/nzqhud2pWSA" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen
                    title="2025 유튜브 총정리">
                </iframe>
                <div class="video-title">2025 유튜브 총정리</div>
            </div>
            
            <div class="video-item">
                <iframe 
                    src="https://www.youtube.com/embed/jNQXAC9IVRw" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen
                    title="뉴진스 - OMG">

                <div class="video-title">뉴진스 - OMG</div>
            </div>

                    title="2025 유튜브 총정리">
                </iframe>
                <div class="video-title">2025 유튜브 총정리</div>
            </div>
            
            <div class="video-item">

                    allowfullscreen

        </div>
    </div>
</body>
</html>
