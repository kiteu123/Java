<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>YouTube 동적 삽입 수정본</title>
    <style>
        /* 기존 스타일 유지 */
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 10px; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .video-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .video-thumbnail { cursor: pointer; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
        .video-thumbnail img { width: 100%; display: block; }
        .thumbnail-info { padding: 8px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 최신 인기 영상 플레이어</h1>
        
        <div class="main-video">
            <div class="video-container">
                <iframe 
                    id="mainVideoFrame"
                    src="https://www.youtube.com/embed/nzqhud2pWSA?rel=0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            </div>
            <div class="video-info" style="margin-top:15px;">
                <h2 id="videoTitle">2025 유튜브 총정리</h2>
                <p id="videoDescription">14F 일사에프 채널의 연말 결산 영상</p>
            </div>
        </div>

        <div class="video-list" id="videoList"></div>
    </div>

    <script>
        // 실제 작동 확인된 최신 영상 데이터
        var videos = [
            {id: 'nzqhud2pWSA', title: '2025 유튜브 총정리', description: '2025년 최고 인기 크리에이터 결산'},
            {id: 'jNQXAC9IVRw', title: '뉴진스 - OMG', description: '인기 뮤직 비디오'},
            {id: 'BgNGgQcjgR8', title: '2024 인기 영상 모음', description: '다람냥 채널의 꿀잼 영상 모음'}
        ];

        var videoList = document.getElementById('videoList');
        var iframe = document.getElementById('mainVideoFrame');

        // 목록 생성
        videos.forEach(function(video, index) {
            var item = document.createElement('div');
            item.className = 'video-thumbnail';
            
            var img = document.createElement('img');
            img.src = "https://img.youtube.com/vi/" + video.id + "/mqdefault.jpg";
            img.alt = video.title;
            // 이미지 로드 실패 시 대체 이미지
            img.onerror = function() {
                this.src = "https://via.placeholder.com/320x180?text=Thumbnail+Error";
            };
            
            var infoDiv = document.createElement('div');
            infoDiv.className = 'thumbnail-info';
            infoDiv.innerHTML = '<strong>' + video.title + '</strong>';
            
            item.appendChild(img);
            item.appendChild(infoDiv);
            
            // 클로저 문제 해결: 각 비디오 ID를 명시적으로 저장
            var videoId = video.id;
            item.onclick = function() { 
                console.log('클릭된 비디오 ID:', videoId);
                changeVideo(videoId); 
            };
            
            videoList.appendChild(item);
        });

        function changeVideo(videoId) {
            console.log('changeVideo 호출됨, videoId:', videoId);
            var video = videos.find(v => v.id === videoId);
            console.log('찾은 비디오:', video);
            
            if (video) {
                try {
                    // 1. iframe src 변경 (캐시 방지를 위해 타임스탬프 추가)
                    var newSrc = "https://www.youtube.com/embed/" + videoId + "?rel=0&autoplay=1";
                    console.log('새로운 src:', newSrc);
                    
                    // iframe을 완전히 새로 로드하기 위해 src를 빈 문자열로 먼저 설정
                    iframe.src = '';
                    setTimeout(function() {
                        iframe.src = newSrc;
                    }, 100);
                    
                    // 2. 텍스트 변경
                    document.getElementById('videoTitle').textContent = video.title;
                    document.getElementById('videoDescription').textContent = video.description;

                    // 3. URL 업데이트 (로컬 파일 에러 방지 처리)
                    try {
                        window.history.pushState({}, '', '?id=' + videoId);
                    } catch (e) {
                        console.log("로컬 환경에서는 URL 업데이트가 제한될 수 있습니다.");
                    }
                } catch (e) {
                    console.error("비디오 변경 중 오류 발생:", e);
                    alert("비디오를 로드하는 중 오류가 발생했습니다: " + e.message);
                }
            } else {
                console.error("비디오를 찾을 수 없습니다:", videoId);
                console.error("사용 가능한 비디오 ID:", videos.map(v => v.id));
                alert("비디오를 찾을 수 없습니다. ID: " + videoId);
            }
        }
    </script>
</body>
</html>
