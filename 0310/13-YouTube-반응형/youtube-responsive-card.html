<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube 반응형 - 카드 레이아웃</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .video-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }
        
        .video-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .video-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 비율 */
            height: 0;
            overflow: hidden;
            background: #000;
        }
        
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .video-info {
            padding: 20px;
        }
        
        .video-info h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.2em;
        }
        
        .video-info p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        
        .video-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #999;
        }
        
        .video-date {
            color: #999;
        }
        
        .video-duration {
            background: #667eea;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
        }
        
        @media (max-width: 768px) {
            .video-cards {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎴 YouTube 동영상 카드 레이아웃</h1>
        
        <div class="video-cards">
            <div class="video-card">
                <div class="video-wrapper">
                    <iframe 
                        src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen
                        title="동영상 1">
                    </iframe>
                </div>
                <div class="video-info">
                    <h3>동영상 제목 1</h3>
                    <p>이것은 동영상에 대한 설명입니다. 여기에 동영상의 내용이나 요약을 작성할 수 있습니다.</p>
                    <div class="video-meta">
                        <span class="video-date">2024.01.15</span>
                        <span class="video-duration">3:33</span>
                    </div>
                </div>
            </div>
            
            <div class="video-card">
                <div class="video-wrapper">
                    <iframe 
                        src="https://www.youtube.com/embed/jNQXAC9IVRw" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen
                        title="동영상 2">
                    </iframe>
                </div>
                <div class="video-info">
                    <h3>동영상 제목 2</h3>
                    <p>카드 형태로 동영상을 배치하면 더 보기 좋고 정돈된 느낌을 줄 수 있습니다. 반응형으로 작동합니다.</p>
                    <div class="video-meta">
                        <span class="video-date">2024.01.14</span>
                        <span class="video-duration">0:19</span>
                    </div>
                </div>
            </div>
            
            <div class="video-card">
                <div class="video-wrapper">
                    <iframe 
                        src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen
                        title="동영상 3">
                    </iframe>
                </div>
                <div class="video-info">
                    <h3>동영상 제목 3</h3>
                    <p>모바일, 태블릿, 데스크톱 등 모든 기기에서 올바르게 표시됩니다. CSS Grid를 사용하여 자동으로 레이아웃이 조정됩니다.</p>
                    <div class="video-meta">
                        <span class="video-date">2024.01.13</span>
                        <span class="video-duration">3:33</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
