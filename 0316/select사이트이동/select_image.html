<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
.select-box{
     position:relative;
    width:200px;
}
select{
    width:100%;
    padding:10px 40px 10px 10px;

    appearance:none;
    -webkit-appearance:none;
    -moz-appearance:none;
    /* 화살표 없애기 */

    border:1px solid #ccc;
    border-radius:5px;
}
.select-box::after{
     content:"▼";

    position:absolute;
    right:10px;
    top:50%;

    transform:translateY(-50%);
    transition:0.3s;

    pointer-events:none;
}

.select-box:focus-within:after{
    transform: translateY(-50%) rotate(180deg);
}



</style>
</head>
<body>
    <div class="select-box">
        <select>
            <option>지역 선택</option>
            <option>서울</option>
            <option>부산</option>
            <option>대구</option>
        </select>
    </div>
</body>
</html>
