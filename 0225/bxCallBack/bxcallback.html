<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/jquery.bxslider.css">
    <link rel="stylesheet" type="text/css"
        href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" />
    <link rel="stylesheet" href="css/style.css">
    <script src="js/jquery-3.1.1.min.js"></script>
    <script src="js/jquery.bxslider.js"></script>
    <title>Document</title>

</head>
<script>
    $(function () {

        var slider = $('.slider').bxSlider({
            auto: true,
            controls: false,
            autoHover: true,

            onSliderLoad: function (currentIndex) {
                $('.slider li h1').removeClass('on');
                $('.slider li .text' + currentIndex).addClass('on');
            },

            // 넘어가기 전
            onSlideAfter: function ($slideElement, oldIndex, newIndex) {
                var k = slider.getCurrentSlide();//현재슬라이드
                $('.slider li').find('h1').removeClass('on');
                $('.slider li .text' + k).addClass('on');
            }
            // onSlideAfter:function($slideElement){
            //	  $('.slider li h1').removeClass('on');
            //	  $slideElement.find('h1').addClass('on');
            //	}
        });
        $('.left_btn').click(function (e) {
            e.preventDefault();
            slider.goToPrevSlide();
        });

        $('.right_btn').click(function (e) {
            e.preventDefault();
            slider.goToNextSlide();
        });

    });
</script>

<body>
    <div id="img_slider">
        <ul class="slider">
            <li>
                <!-- <i class="fa fa-twitter" aria-hidden="true"></i>  -->
                <a href="#"><img src="images/01.JPG" alt=""></a>
                <h1 class="text0 on">fashion style1</h1>
            </li>
            <li>
                <a href="#"><img src="./images/02.JPG" alt=""></a>
                <h1 class='text1'>fashion style2</h1>
            </li>
            <li>
                <a href="#"><img src="./images/03.JPG" alt=""></a>
                <h1 class='text2'>fashion style3</h1>
            </li>
            <li>
                <a href="#"><img src="./images/04.JPG"></a>
                <h1 class="text3">fashion style4</h1>
            </li>
            <li>
                <a href="#"><img src="./images/05.JPG"></a>
                <h1 class="text4">fashion style5</h1>
            </li>
            <li>
                <a href="#"><img src="./images/06.JPG"></a>
                <h1 class="text5">fashion style6</h1>
            </li>
            <li>
                <a href="#"><img src="./images/07.JPG"></a>
                <h1 class="text6">fashion style7</h1>
            </li>
        </ul>
        <div id="btn">
            <p class="left_btn">
                <i class="fa fa-arrow-left" aria-hidden="true"></i>
            </p>
            <p class="right_btn">
                <i class="fa fa-arrow-right" aria-hidden="true"></i>
            </p>
        </div>
    </div>
</body>

</html>
