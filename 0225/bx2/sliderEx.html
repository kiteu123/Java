<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/jquery.bxslider.css">
    <script src="js/jquery-3.1.1.min.js"></script>
    <script src="js/jquery.bxslider.js"></script>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    header {
        width: 960px;
        height: 200px;
        margin: 0 auto;
        background-color: pink;
    }

    section {
        width: 960px;
        height: 800px;
        margin: 0 auto;
        border: 1px solid red;
    }

    .bx-wrapper {
        border: none !important;
        box-shadow: none !important;
    }

    .bx-wrapper {
        width: 400px;
        height: 200px;
    }

    .bxslider img {
        width: 100%;
        height: 200px;
        object-fit: cover;
    }

    .bx-wrapper .bx-pager {
        position: absolute;
        top: 5px;
        right: 10px;
        width: auto;
        text-align: left;
        z-index: 100;
    }

    .bx-wrapper .bx-pager.bx-default-pager a.active {
        background: orange;
    }

    .bx-wrapper .bx-prev {
        width: 50px !important;
        height: 50px !important;
        background: url(images2/slide_arrow.png) no-repeat 0 0;
    }

    .bx-wrapper .bx-prev:hover {
        background: url(images2/slide_arrow.png) no-repeat 0 -50px;
    }

    .bx-wrapper .bx-next {
        width: 50px !important;
        height: 50px !important;
        background: url(images2/slide_arrow.png) no-repeat -40px 0;
    }

    .bx-wrapper .bx-next:hover {
        background: url(images2/slide_arrow.png) no-repeat -40px -50px;
    }
</style>
<script>
    $(function () {
        $('.bxslider').bxSlider({

        });
    });
</script>

<body>
    <header>헤더</header>
    <section>
        <ul class="bxslider">
            <li><img src="images2/s1.jpg" alt="사진1"></li>
            <li><img src="images2/s2.jpg" alt="사진2"></li>
            <li><img src="images2/s3.png" alt="사진3"></li>
            <li><img src="images2/s4.jpg" alt="사진4"></li>
        </ul>
    </section>
</body>

</html>
