<!DOCTYPE html>
<html lang="en">

<head>

    <title>Document</title>
    <link rel="stylesheet" href="css/jquery.bxslider.css">
    <script src="js/jquery-3.1.1.min.js"></script>
    <script src="js/jquery.bxslider.min.js"></script>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    header {
        width: 100%;
        max-width: 960px;
        height: 200px;
        margin: 0 auto;
        background-color: pink;
    }

    section {
        width: 100%;
        max-width: 960px;
        height: 800px;
        margin: 0 auto;
        border: 1px solid red;
    }
</style>
<script>
    $(function () {
        $('.slider1').bxSlider({
            auto: true,
            moveSlides: 1,
            minSlides: 1,
            maxSlides: 4,
            slideWidth: 230,
            slideMargin: 10,
            shrinkItems: true,
        });
    })
</script>

<body>
    <header>헤더</header>
    <section>
        <ul class="slider1">
            <li><img src="img/images(1).jpg" alt="메인사진1" title="메인사진1"></li>
            <li><img src="img/images(2).jpg" alt="메인사진2" title="메인사진1"></li>
            <li><img src="img/images(3).jpg" alt="메인사진3" title="메인사진1"></li>
            <li><img src="img/images(4).jpg" alt="메인사진4" title="메인사진1"></li>
            <li><img src="img/images(5).jpg" alt="메인사진5" title="메인사진1"></li>
        </ul>
    </section>
</body>

</html>
